[package]
name = "nfs-mamont"
version = "0.0.0"
edition = "2021"
authors = ["Rmamonts"]
description = "A Rust NFS Server implementation"
publish = false
rust-version = "1.83.0"

[lib]
doctest = false

[dependencies]
async-trait = "0.1.89"
byteorder = "1.5"
dashmap = "6.1.0"
filetime = "0.2"
futures = "0.3.31"
moka = { version = "0.12.10", features = ["sync"] }
num-derive = "0.4"
num-traits = "0.2"
tokio = { version = "1.47", features = ["full", "time"] }
tracing = "0.1.41"

[dev-dependencies]
clap = "4.5.47"
clap_derive = "4.5.47"
intaglio = "1.10"
tracing-subscriber = { version = "0.3.20", features = ["tracing-log"] }

[[example]]
name = "mirrorfs"
path = "examples/mirror_fs/main.rs"
