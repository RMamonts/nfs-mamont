[allocator]
read_buffer_size = 1048576
read_buffer_count = 2048
write_buffer_size = 1048576
write_buffer_count = 2048

[disk_io]
worker_count = 4
ring_entries = 256
max_inflight_per_worker = 512
channel_capacity = 1024
prefetch_budget_per_worker = 32
enable_fixed_files = false

[read_path]
small_io_threshold = 32768
read_ahead_trigger_bytes = 262144
read_ahead_window_blocks = 8
read_ahead_per_file_limit = 16
sequential_detection_window_ms = 6000
sendfile_min_bytes = 32768

[exports]
root = "/mnt/nfs"
paths = ["fs01", "fs02", "fs03", "fs04"]
